{% extends "base.html" %}
{% block title %}Add lab result — {{ patient.full_name }}{% endblock %}
{% block content %}

<header class="page-header">
  <div>
    <span class="eyebrow">{{ patient.mrn }}</span>
    <h1>Add a lab result for {{ patient.full_name }}</h1>
  </div>
</header>

<section class="panel form-panel">
  <form method="POST" class="record-form">
    <div class="form-row">
      <label>
        <span>Test name</span>
        <input type="text" name="test_name" placeholder="e.g. HbA1c" required>
      </label>
      <label>
        <span>Flag</span>
        <select name="flag">
          {% for f in ['Normal', 'Low', 'High', 'Critical'] %}
          <option value="{{ f }}">{{ f }}</option>
          {% endfor %}
        </select>
      </label>
    </div>

    <div class="form-row">
      <label>
        <span>Result value</span>
        <input type="text" name="result_value" required>
      </label>
      <label>
        <span>Unit</span>
        <input type="text" name="unit" placeholder="mg/dL">
      </label>
      <label>
        <span>Reference range</span>
        <input type="text" name="reference_range" placeholder="0.6 - 1.3">
      </label>
    </div>

    <div class="form-actions">
      <a href="{{ url_for('patient_detail', patient_id=patient.id) }}" class="btn btn-secondary">Cancel</a>
      <button type="submit" class="btn btn-primary">Save result</button>
    </div>
  </form>
</section>

{% endblock %}
